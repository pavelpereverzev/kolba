name: Update QGIS Plugin Downloads Badge

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch downloads from QGIS
        env:
          PLUGIN_ID: "4321" 
        run: |
          import urllib.request
          import json
          import os

          plugin_id = os.environ['PLUGIN_ID']
          url = f"https://qgis.org{plugin_id}/"
          
          # Отправляем запрос с заголовком User-Agent, чтобы сервер не блокировал нас
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  json_data = json.loads(response.read().decode('utf-8'))
              
              # Напрямую забираем число скачиваний из JSON
              downloads_count = str(json_data.get('downloads', 0))
              print(f"Found downloads: {downloads_count}")
              
              badge_data = {
                  "schemaVersion": 1,
                  "label": "qgis downloads",
                  "message": downloads_count,
                  "color": "blue"
              }
              
              with open("qgis_stats.json", "w") as f:
                  json.dump(badge_data, f, indent=2)
                  
          except Exception as e:
              print(f"Error fetching data from QGIS API: {e}")
              exit(1)
        shell: python

      # Отправляем локальный файл в Gist через официальное готовое действие
      - name: Update Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 9d19f363ecd61bdc1e4db883e10df578
          file_path: qgis_stats.json
          file_type: text
