name: Update QGIS Plugin Downloads Badge

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # get requests
      - name: Install dependencies
        run: pip install requests

      - name: Fetch downloads from QGIS
        run: |
          import requests
          import xml.etree.ElementTree as ET
          import json

          try:
              # get xml
              response = requests.get("https://plugins.qgis.org/plugins/plugins.xml?qgis=4.0", timeout=15, verify=False)
              xml = response.text

              root = ET.fromstring(xml)
              downloads = None

              for plugin in root.findall("pyqgis_plugin"):
                  if plugin.attrib.get("plugin_id") == "4321":
                      downloads = plugin.findtext("downloads")
                      break

              print(f"Found downloads: {downloads}")

              if downloads is None:
                  downloads = "0"

              # make a structure for shields.io
              badge_data = {
                  "schemaVersion": 1,
                  "label": "qgis downloads",
                  "message": str(downloads),
                  "color": "blue"
              }

              # save into file
              with open("qgis_stats.json", "w") as f:
                  json.dump(badge_data, f, indent=2)

          except Exception as e:
              print(f"Error: {e}")
              exit(1)
        shell: python

      # send to gist
      - name: Update Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 9d19f363ecd61bdc1e4db883e10df578
          file_path: qgis_stats.json
          file_type: text
