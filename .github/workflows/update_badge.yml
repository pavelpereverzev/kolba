name: Update QGIS Plugin Downloads Badge

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch downloads from QGIS
        env:
          PLUGIN_ID: "4321" # Убедитесь, что тут ID вашего плагина
        run: |
          import urllib.request
          import json
          import xml.etree.ElementTree as ET
          import os

          url = "https://qgis.org"
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  xml_data = response.read()
              
              root = ET.fromstring(xml_data)
              downloads_count = "0"
              
              for plugin in root.findall('pyqgis_plugin'):
                  if plugin.get('plugin_id') == os.environ['PLUGIN_ID']:
                      download_node = plugin.find('downloads')
                      if download_node is not None:
                          downloads_count = download_node.text
                      break
              
              print(f"Found downloads: {downloads_count}")
              
              badge_data = {
                  "schemaVersion": 1,
                  "label": "qgis downloads",
                  "message": downloads_count,
                  "color": "blue"
              }
              
              # Просто сохраняем файл локально на диск виртуальной машины
              with open("qgis_stats.json", "w") as f:
                  json.dump(badge_data, f, indent=2)
                  
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
        shell: python

      # Отправляем локальный файл в Gist через официальное готовое действие
      - name: Update Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: 9d19f363ecd61bdc1e4db883e10df578
          file_path: qgis_stats.json
          file_type: text
