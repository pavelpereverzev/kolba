name: Update QGIS Plugin Downloads Badge

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write
  
jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch downloads and update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: "9d19f363ecd61bdc1e4db883e10df578" 
          PLUGIN_ID: "4321" 
        run: |
          import os
          import urllib.request
          import json
          import xml.etree.ElementTree as ET

          # 1. XML QGIS plugins
          url = "https://plugins.qgis.org/plugins/plugins.xml?qgis=4.0"
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  xml_data = response.read()
              
              root = ET.fromstring(xml_data)
              downloads_count = "0"
              
              for plugin in root.findall('pyqgis_plugin'):
                  if plugin.get('plugin_id') == os.environ['PLUGIN_ID']:
                      download_node = plugin.find('downloads')
                      if download_node is not None:
                          downloads_count = download_node.text
                      break
              
              print(f"Found downloads: {downloads_count}")
              
              # 2. JSON of Shields.io
              badge_data = {
                  "schemaVersion": 1,
                  "label": "qgis downloads",
                  "message": downloads_count,
                  "color": "blue"
              }
              
              # 3. send JSON to GitHub Gist 
              gist_id = os.environ['GIST_ID']
              gist_url = f"https://github.com{gist_id}"
              
              payload = {
                  "files": {
                      "qgis_stats.json": {
                          "content": json.dumps(badge_data, indent=2)
                      }
                  }
              }
              
              gist_req = urllib.request.Request(
                  gist_url,
                  data=json.dumps(payload).encode('utf-8'),
                  headers={
                      "Authorization": f"Bearer {os.environ['GIST_TOKEN']}",
                      "Content-Type": "application/json"
                  },
                  method="PATCH"
              )
              
              with urllib.request.urlopen(gist_req) as res:
                  print("Gist successfully updated!", res.status)
                  
          except Exception as e:
              print(f"Error occurred: {e}")
              exit(1)
        shell: python
